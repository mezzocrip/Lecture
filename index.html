<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement à la Lecture Instantanée</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }
        #zone-texte-complet {
            font-size: 24px;
            line-height: 1.6;
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background-color: #fafafa;
            border-radius: 8px;
            border: 1px solid #eee;
            min-height: 100px;
        }
        .mot {
            padding: 2px 4px;
            margin: 0 2px;
            border-radius: 4px;
            transition: background-color 0.05s;
            display: inline-block;
        }
        .mot.attendu {
            background-color: #cfe2ff;
            font-weight: bold;
        }
        .mot.correct {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        .mot.erreur {
            background-color: #f8d7da;
            color: #842029;
            font-weight: bold;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: background 0.2s;
        }
        #btn-start {
            background-color: #007BFF;
            color: white;
            width: 100%;
        }
        #btn-start:hover {
            background-color: #0056b3;
        }
        #btn-random {
            background-color: #28a745;
            color: white;
            flex: 1;
            font-size: 15px;
            padding: 10px;
        }
        #btn-random:hover {
            background-color: #218838;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #statut {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            font-style: italic;
        }
        #info-texte {
            margin: 10px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Générateur de Lecture Vocale</h1>
    
    <p>1. Collez votre texte ou générez une histoire :</p>
    <textarea id="texte-input" placeholder="Collez votre texte ici..."></textarea>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;">
        <div id="info-texte">Mots détectés : 0</div>
        <button id="btn-random">🎲 Histoire Aléatoire</button>
    </div>
    
    <br>
    <button id="btn-start">Autoriser le micro & Démarrer</button>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

    <div id="zone-texte-complet">Le texte à lire s'affichera ici...</div>
    
    <p id="statut">Cliquez sur le bouton pour activer le micro.</p>
</div>

<script>
    const histoiresBanque = [
        "C'est le soir dans la chambre d'Hugo. Lili regarde sous le lit mais elle n'a rien trouvé. Où est passé le doudou de Taoki ? C'est un petit ours bleu qui s'appelle Titi. Soudain, l'ours bouge tout seul dans l'armoire ! J'ai un peu peur, dit Hugo en chuchotant. Taoki s'approche doucement et ouvre la porte. Ouf ! C'est le petit chat noir qui joue avec l'ours ! Taoki rigole, attrape son doudou et fait un câlin à l'ami chat.",
        "C'est le matin, le soleil brille dans le jardin. Hugo et Lili jouent au ballon sur l'herbe verte. Soudain, un petit dragon vert arrive en volant : c'est Taoki ! Taoki rigole et attrape le ballon avec sa queue. Mais regardez là-bas, sous le grand arbre ! Un petit chat noir regarde nos trois amis. Taoki s'approche doucement et lui dit bonjour. Le petit chat a peur et grimpe vite sur une branche. Lili lui donne un peu de lait dans un bol.",
        "Aujourd'hui, c'est la fête à l'école ! Hugo a un beau chapeau de pirate. Lili a une robe de fée. Taoki arrive avec un grand sac. Qu'y a-t-il dans le sac ? C'est un gros gâteau d'or ! Tout le monde rigole bien. J'adore la musique, dit Lili en dansant. Le chat noir regarde par la fenêtre. C'est une super journée pour l'ami Taoki !",
        "Taoki est à la cuisine avec Lili. J'ai faim, dit le petit dragon vert. Hugo apporte des pommes rouges et du chocolat. C'est bon ! Taoki prépare un bon jus de fruits. Mais il fait une bêtise ! Le jus coule partout sur la table de la cuisine. Lili lave le sol avec une éponge. Taoki est désolé mais il sourit.",
        "Regardez, c'est l'heure d'aller à la mer ! Taoki met son beau maillot de bain rouge. Hugo et Lili courent sur le sable chaud. L'eau est bleue et très belle. Taoki plonge dans une vague en rigolant. Il trouve un joli coquillage rose sur la plage. J'ai trouvé un trésor, dit-il à Lili. C'est une journée magnifique à la plage !",
        "Le petit chat noir est malade aujourd'hui. Il reste couché dans son petit panier. Taoki apporte une couverture douce pour l'ami chat. Hugo donne un médicament. Lili caresse sa tête doucement. Le chat ronronne, il va déjà mieux ! Merci mes amis, semble dire le petit chat. C'est bien de s'occuper de lui.",
        "C'est l'automne, l'arbre du jardin perd ses feuilles. Hugo ramasse les feuilles avec un grand balai. Lili fait un énorme tas jaune et rouge. Taoki arrive en courant et saute dans les feuilles ! Tout s'envole dans le ciel ! C'est drôle, l'ami Taoki est tout rouge. Hugo rigole et recommence son travail avec Lili."
    ];

    let listeMotsBruts = [];
    let indexActuel = 0;
    let tempsDebut = 0;
    let totalMots = 0;

    const texteInput = document.getElementById('texte-input');
    const infoTexte = document.getElementById('info-texte');
    const zoneTexteComplet = document.getElementById('zone-texte-complet');
    const btnStart = document.getElementById('btn-start');
    const btnRandom = document.getElementById('btn-random');
    const statut = document.getElementById('statut');

    // Filtre les mots pour éliminer les ponctuations seules (!, ?, ., :, etc.) dès le départ
    function preparerMots(texte) {
        if (!texte.trim()) return [];
        return texte.split(/\s+/).filter(mot => {
            let m = mot.trim();
            return m.length > 0 && !/^[\!,\.\?:\-«»]+$/.test(m);
        });
    }

    function nettoyerMot(mot) {
        if (!mot) return "";
        let motPropre = mot.toLowerCase().replace(/’/g, "'");
        if (motPropre === "lili") return "lily";
        return motPropre.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"«»!]/g, "").trim();
    }

    function rafraichirNombreMots() {
        const mots = preparerMots(texteInput.value);
        infoTexte.textContent = `Mots détectés : ${mots.length}`;
    }

    texteInput.addEventListener('input', rafraichirNombreMots);

    btnRandom.addEventListener('click', () => {
        const indexAleatoire = Math.floor(Math.random() * histoiresBanque.length);
        texteInput.value = histoiresBanque[indexAleatoire];
        rafraichirNombreMots();
        statut.textContent = "Une histoire aléatoire a été chargée ! Cliquez sur Démarrer.";
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        statut.textContent = "Votre navigateur ne supporte pas la reconnaissance vocale.";
        btnStart.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = true;
        recognition.interimResults = true; 

        function genererAffichageTexte() {
            zoneTexteComplet.innerHTML = "";
            listeMotsBruts.forEach((mot, index) => {
                const span = document.createElement('span');
                span.textContent = mot + " ";
                span.className = "mot";
                span.id = "mot-" + index;
                if (index === 0) span.classList.add('attendu');
                zoneTexteComplet.appendChild(span);
            });
        }

        // Fonction automatique améliorée : passe Taoki ET les ponctuations résiduelles blanches
        function verifierEtPasserMotsSpeciaux() {
            if (indexActuel >= listeMotsBruts.length) return;
            
            const motAttendu = nettoyerMot(listeMotsBruts[indexActuel]);
            
            // Si c'est Taoki OU si le mot nettoyé est vide (uniquement de la ponctuation passée entre les mailles)
            if (motAttendu === "taoki" || motAttendu === "") {
                const spanActuel = document.getElementById("mot-" + indexActuel);
                if (spanActuel) {
                    spanActuel.className = "mot correct";
                    indexActuel++;
                    
                    if (indexActuel < listeMotsBruts.length) {
                        const spanSuivant = document.getElementById("mot-" + indexActuel);
                        if (spanSuivant) spanSuivant.classList.add('attendu');
                        // On relance la vérification en chaîne
                        verifierEtPasserMotsSpeciaux();
                    } else {
                        finaliserLecture();
                    }
                }
            }
        }

        function finaliserLecture() {
            const tempsFin = performance.now();
            const tempsTotalSecondes = ((tempsFin - tempsDebut) / 1000).toFixed(1);
            statut.innerHTML = `<strong>Félicitations ! 🎉</strong> Vous avez lu les <strong>${totalMots} mots</strong> en <strong>${tempsTotalSecondes} secondes</strong> !`;
            btnStart.disabled = false;
            texteInput.disabled = false;
            btnRandom.disabled = false;
            recognition.stop();
        }

        function lancerReconnaissance() {
            indexActuel = 0;
            totalMots = listeMotsBruts.length;
            tempsDebut = performance.now();

            genererAffichageTexte();
            statut.textContent = "Lecture en cours...";
            btnStart.disabled = true;
            texteInput.disabled = true;
            btnRandom.disabled = true;

            // Premier scan dès le démarrage
            verifierEtPasserMotsSpeciaux();
            
            recognition.start();
        }

        btnStart.addEventListener('click', async () => {
            listeMotsBruts = preparerMots(texteInput.value);
            
            if (listeMotsBruts.length === 0) {
                alert("Veuillez d'abord entrer du texte ou cliquer sur 'Histoire Aléatoire'.");
                return;
            }

            statut.textContent = "Demande d'accès au micro...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                lancerReconnaissance();
            } catch (err) {
                console.error(err);
                statut.textContent = "Accès micro refusé. Allez dans Réglages > Safari > Microphone.";
            }
        });

        recognition.onresult = (event) => {
            let transcriptionEnCours = "";
            let transcriptionFinale = "";
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcriptionFinale += event.results[i][0].transcript.toLowerCase() + " ";
                } else {
                    transcriptionEnCours += event.results[i][0].transcript.toLowerCase() + " ";
                }
            }

            let texteGlobal = (transcriptionFinale + " " + transcriptionEnCours).toLowerCase().replace(/’/g, "'").trim();
            
            const motAttendu = nettoyerMot(listeMotsBruts[indexActuel]);
            const spanActuel = document.getElementById("mot-" + indexActuel);

            if (spanActuel && motAttendu) {
                let motValide = false;
                
                if (texteGlobal.includes(motAttendu)) {
                    motValide = true;
                } else if (motAttendu === "lily" && texteGlobal.includes("lili")) {
                    motValide = true;
                }

                if (motValide) {
                    spanActuel.className = "mot correct";
                    indexActuel++;

                    if (indexActuel < listeMotsBruts.length) {
                        const spanSuivant = document.getElementById("mot-" + indexActuel);
                        if (spanSuivant) spanSuivant.classList.add('attendu');
                        
                        // Scan automatique après validation d'un mot valide
                        verifierEtPasserMotsSpeciaux();
                    } else {
                        finaliserLecture();
                    }
                }
            }
        };

        recognition.onerror = (event) => {
            if (event.error !== 'no-speech') {
                statut.textContent = "Erreur micro : " + event.error;
                btnStart.disabled = false;
                texteInput.disabled = false;
                btnRandom.disabled = false;
            }
        };

        recognition.onend = () => {
            if (indexActuel < listeMotsBruts.length && btnStart.disabled === true) {
                recognition.start();
            }
        };
    }
</script>

</body>
</html>
