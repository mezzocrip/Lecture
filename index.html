<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement à la Lecture Instantanée</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }
        #zone-texte-complet {
            font-size: 24px;
            line-height: 1.6;
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background-color: #fafafa;
            border-radius: 8px;
            border: 1px solid #eee;
            min-height: 100px;
        }
        .mot {
            padding: 2px 4px;
            margin: 0 2px;
            border-radius: 4px;
            transition: background-color 0.05s; /* Transition quasi instantanée */
            display: inline-block;
        }
        .mot.attendu {
            background-color: #cfe2ff;
            font-weight: bold;
        }
        .mot.correct {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        .mot.erreur {
            background-color: #f8d7da;
            color: #842029;
            font-weight: bold;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #statut {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            font-style: italic;
        }
        #info-texte {
            margin: 10px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Générateur de Lecture Vocale</h1>
    
    <p>1. Collez votre texte ci-dessous :</p>
    <textarea id="texte-input" placeholder="Collez votre texte ici..."></textarea>
    <div id="info-texte">Mots détectés : 0</div>
    
    <br>
    <button id="btn-start">Autoriser le micro & Démarrer</button>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

    <div id="zone-texte-complet">Le texte à lire s'affichera ici...</div>
    
    <p id="statut">Cliquez sur le bouton pour activer le micro.</p>
</div>

<script>
    let listeMotsBruts = [];
    let indexActuel = 0;
    let tempsDebut = 0;
    let totalMots = 0;

    const texteInput = document.getElementById('texte-input');
    const infoTexte = document.getElementById('info-texte');
    const zoneTexteComplet = document.getElementById('zone-texte-complet');
    const btnStart = document.getElementById('btn-start');
    const statut = document.getElementById('statut');

    function preparerMots(texte) {
        if (!texte.trim()) return [];
        return texte.split(/\s+/).filter(mot => mot.length > 0);
    }

    function nettoyerMot(mot) {
        if (!mot) return "";
        return mot.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"«»’']/g, "").trim();
    }

    texteInput.addEventListener('input', () => {
        const mots = preparerMots(texteInput.value);
        infoTexte.textContent = `Mots détectés : ${mots.length}`;
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        statut.textContent = "Votre navigateur ne supporte pas la reconnaissance vocale.";
        btnStart.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = true;
        recognition.interimResults = true; 

        function genererAffichageTexte() {
            zoneTexteComplet.innerHTML = "";
            listeMotsBruts.forEach((mot, index) => {
                const span = document.createElement('span');
                span.textContent = mot + " ";
                span.className = "mot";
                span.id = "mot-" + index;
                if (index === 0) span.classList.add('attendu');
                zoneTexteComplet.appendChild(span);
            });
        }

        function lancerReconnaissance() {
            indexActuel = 0;
            totalMots = listeMotsBruts.length;
            tempsDebut = performance.now();

            genererAffichageTexte();
            statut.textContent = "Lecture en cours...";
            btnStart.disabled = true;
            texteInput.disabled = true;

            recognition.start();
        }

        btnStart.addEventListener('click', async () => {
            listeMotsBruts = preparerMots(texteInput.value);
            
            if (listeMotsBruts.length === 0) {
                alert("Veuillez d'abord entrer du texte à lire.");
                return;
            }

            statut.textContent = "Demande d'accès au micro...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                lancerReconnaissance();
            } catch (err) {
                console.error(err);
                statut.textContent = "Accès micro refusé. Allez dans Réglages > Safari > Microphone.";
            }
        });

        recognition.onresult = (event) => {
            let transcriptionEnCours = "";
            let transcriptionFinale = "";
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcriptionFinale += event.results[i][0].transcript.toLowerCase() + " ";
                } else {
                    transcriptionEnCours += event.results[i][0].transcript.toLowerCase() + " ";
                }
            }

            const texteGlobal = (transcriptionFinale + " " + transcriptionEnCours).trim();
            const motAttendu = nettoyerMot(listeMotsBruts[indexActuel]);
            const spanActuel = document.getElementById("mot-" + indexActuel);

            if (spanActuel && motAttendu) {
                // Détection ultra-rapide si le mot attendu apparaît n'importe où dans le flux récent
                if (texteGlobal.includes(motAttendu)) {
                    spanActuel.className = "mot correct";
                    indexActuel++;

                    if (indexActuel < listeMotsBruts.length) {
                        const spanSuivant = document.getElementById("mot-" + indexActuel);
                        if (spanSuivant) spanSuivant.classList.add('attendu');
                    } else {
                        const tempsFin = performance.now();
                        const tempsTotalSecondes = ((tempsFin - tempsDebut) / 1000).toFixed(1);

                        statut.innerHTML = `<strong>Félicitations ! 🎉</strong> Vous avez lu les <strong>${totalMots} mots</strong> en <strong>${tempsTotalSecondes} secondes</strong> !`;
                        
                        btnStart.disabled = false;
                        texteInput.disabled = false;
                        recognition.stop();
                    }
                }
            }
        };

        recognition.onerror = (event) => {
            if (event.error !== 'no-speech') {
                statut.textContent = "Erreur micro : " + event.error;
                btnStart.disabled = false;
                texteInput.disabled = false;
            }
        };

        recognition.onend = () => {
            if (indexActuel < listeMotsBruts.length && btnStart.disabled === true) {
                recognition.start();
            }
        };
    }
</script>

</body>
</html>
